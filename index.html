<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakpoint OPS</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#f0f2f5;}
.screen{display:none;}
.screen.active{display:block;}
.splash{background:#2d4a3e;padding:20px;color:white;text-align:center;}
button{padding:15px;margin:10px;width:90%;border:none;border-radius:10px;font-size:16px;}
</style>
</head>

<body>

<!-- SCREEN 1 -->
<div class="screen active" id="s1">
  <div class="splash">👉 Sélectionnez votre station</div>
  <button onclick="go('Evere')">Evere</button>
  <button onclick="go('Bruxelles')">Bruxelles</button>
</div>

<!-- SCREEN 2 -->
<div class="screen" id="s2">
  <div class="splash" id="station"></div>
  <button onclick="show('s3')">📦 Gestion stock</button>
</div>

<!-- SCREEN 3 -->
<div class="screen" id="s3">
  <div class="splash">📦 Réception</div>

  <button onclick="openScanner()">📷 Scanner</button>
  <input id="ean" placeholder="EAN" style="width:90%;padding:10px;margin:10px">

  <input id="name" placeholder="Nom produit" style="width:90%;padding:10px;margin:10px">
  <input id="dlc" type="date" style="width:90%;padding:10px;margin:10px">

  <button onclick="save()">✅ Enregistrer</button>
</div>

<!-- SCANNER -->
<div id="scanner" style="display:none;position:fixed;inset:0;background:black;color:white;justify-content:center;align-items:center;flex-direction:column;">
  <video id="video" autoplay playsinline style="width:90%"></video>
  <button onclick="closeScanner()">Fermer</button>
</div>

<script>
// 🔥 TON SUPABASE
const SUPABASE_URL = "https://hhsvazolktxqntyhuqqj.supabase.co";
const SUPABASE_KEY = "sb_publishable_qr4Qq4OB-Qt1G8a0GO3WKw_IJxfRbl9";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentStation = "";
let stream = null;
let detector = null;

// NAV
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function go(station){
  currentStation = station;
  document.getElementById("station").innerText = station;
  show("s2");
}

// SCAN
async function openScanner(){
  document.getElementById("scanner").style.display="flex";

  stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  });

  const video = document.getElementById("video");
  video.srcObject = stream;

  if("BarcodeDetector" in window){
    detector = new BarcodeDetector({formats:["ean_13","code_128"]});

    setInterval(async ()=>{
      const codes = await detector.detect(video);
      if(codes.length){
        document.getElementById("ean").value = codes[0].rawValue;
        closeScanner();
        loadProduct(codes[0].rawValue);
      }
    },500);
  }
}

function closeScanner(){
  document.getElementById("scanner").style.display="none";
  if(stream) stream.getTracks().forEach(t=>t.stop());
}

// LOAD PRODUIT
async function loadProduct(ean){
  const {data} = await supabase
    .from("produits")
    .select("*")
    .eq("ean",ean)
    .single();

  if(data){
    document.getElementById("name").value = data.nom;
  }
}

// SAVE
async function save(){
  const ean = document.getElementById("ean").value;
  const name = document.getElementById("name").value;
  const dlc = document.getElementById("dlc").value;

  if(!ean || !name || !dlc){
    alert("Remplis tout");
    return;
  }

  // produit
  await supabase.from("produits").upsert({
    ean:ean,
    nom:name
  });

  // lot
  await supabase.from("lots").insert({
    ean:ean,
    station:currentStation,
    dlc:dlc,
    quantite:1,
    statut:"actif"
  });

  alert("✅ Enregistré");
}
</script>

</body>
</html>
