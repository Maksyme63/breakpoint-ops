<!DOCTYPE html>
<html lang="fr">
<head>
 <link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#2d4a3e">

<link rel="apple-touch-icon" href="assets/logo-breakpoint.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Breakpoint"> 
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Breakpoint OPS</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --green:#2d4a3e;
      --green-2:#3d6354;
      --orange:#e8911a;
      --gray:#f0f2f5;
      --gray2:#dfe3e8;
      --text:#111827;
      --muted:#6b7280;
      --white:#fff;
      --red:#cc3333;
      --ok:#16a34a;
      --shadow:0 4px 18px rgba(0,0,0,.12);
      --radius:14px;
      --maxw:500px;
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--gray);
      color:var(--text);
      max-width:var(--maxw);
      margin-inline:auto;
      min-height:100vh;
      overflow-x:hidden;
    }

    .screen{display:none; min-height:100vh; background:var(--gray);}
    .screen.active{display:block;}

    .topbar{
      position:sticky;
      top:0;
      z-index:50;
      background:var(--green);
      color:#fff;
      padding:12px 14px;
      box-shadow:0 4px 16px rgba(0,0,0,.18);
      display:flex;
      align-items:center;
      gap:10px;
    }

    .back-btn{
      border:none;
      background:rgba(255,255,255,.14);
      color:#fff;
      width:40px;
      height:40px;
      border-radius:10px;
      font-size:22px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .topbar-title{
      font-size:17px;
      font-weight:700;
      line-height:1.2;
    }

    .topbar-sub{
      font-size:11px;
      opacity:.8;
      margin-top:2px;
    }

    .hero-home{
      min-height:240px;
      background:
        linear-gradient(rgba(45,74,62,.60), rgba(45,74,62,.72)),
        url("assets/team-photo.jpg") center/cover no-repeat;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      text-align:center;
      padding:28px 18px;
      color:#fff;
      position:relative;
    }

    .home-logo{
      position:absolute;
      top:22px;
      left:50%;
      transform:translateX(-50%);
      width:86px;
      height:86px;
      object-fit:contain;
      border-radius:50%;
      background:rgba(255,255,255,.12);
      padding:6px;
      box-shadow:0 8px 20px rgba(0,0,0,.18);
    }

    .hero-home h1{
      margin:0;
      font-size:28px;
      font-weight:800;
      display:none;
    }

    .hero-home p{
      margin:0;
      font-size:14px;
      font-weight:700;
    }

    .hero-station{
      min-height:190px;
      background:
        linear-gradient(rgba(0,0,0,.28), rgba(0,0,0,.45)),
        url("assets/station-bag.jpg") center/cover no-repeat;
      display:flex;
      align-items:flex-end;
      padding:24px 18px;
      color:#fff;
    }

    .hero-station-title{
      font-size:25px;
      font-weight:800;
      margin:0 0 4px 0;
    }

    .hero-station-sub{
      margin:0;
      font-size:13px;
      opacity:.92;
      font-weight:600;
    }

    .section{
      padding:18px 16px 28px;
    }

    .section-title{
      font-size:18px;
      font-weight:800;
      margin:0 0 6px;
    }

    .section-sub{
      color:var(--muted);
      font-size:13px;
      margin:0 0 14px;
    }

    .station-btn,
    .module-btn,
    .action-btn,
    .ghost-btn,
    .save-btn{
      width:100%;
      border:none;
      border-radius:var(--radius);
      cursor:pointer;
      box-shadow:var(--shadow);
      font-size:16px;
    }

    .station-btn{
      background:#fff;
      text-align:left;
      padding:18px 16px;
      margin-bottom:10px;
      border:2px solid #e4e7eb;
      font-weight:700;
    }

    .station-btn small{
      display:none;
    }

    .module-list{
      padding:16px;
      display:grid;
      gap:12px;
    }

    .module-btn{
      min-height:82px;
      padding:16px;
      color:#fff;
      text-align:left;
      display:flex;
      align-items:center;
      justify-content:space-between;
      font-weight:800;
    }

    .module-btn .sub{
      display:block;
      margin-top:4px;
      font-size:12px;
      opacity:.88;
      font-weight:600;
    }

    .module-btn.stock{background:linear-gradient(135deg,var(--green-2),var(--green))}
    .module-btn.orange{background:linear-gradient(135deg,#f4a122,var(--orange))}
    .module-btn.gray{background:linear-gradient(135deg,#9aa3af,#6b7280)}

    .badge-soon{
      font-size:11px;
      background:rgba(255,255,255,.18);
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.22);
      white-space:nowrap;
    }

    .card{
      background:#fff;
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:16px;
    }

    .scan-card{
      background:#101828;
      color:#fff;
      border-radius:18px;
      overflow:hidden;
      box-shadow:var(--shadow);
      margin-bottom:16px;
    }

    .scan-visual{
      min-height:180px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      gap:14px;
      background:linear-gradient(180deg,#243041,#111827);
      cursor:pointer;
    }

    .scan-box{
      width:220px;
      height:90px;
      border:3px solid rgba(255,255,255,.9);
      border-radius:12px;
      position:relative;
      overflow:hidden;
    }

    .scan-line{
      position:absolute;
      left:0;
      right:0;
      height:3px;
      background:linear-gradient(90deg, transparent, #ff4d4d, transparent);
      box-shadow:0 0 10px #ff4d4d;
      animation:scanMove 1.6s infinite alternate ease-in-out;
    }

    @keyframes scanMove{
      from{top:8px}
      to{top:calc(100% - 8px)}
    }

    .scan-controls{
      display:flex;
      gap:8px;
      padding:10px;
      background:rgba(255,255,255,.06);
    }

    .scan-controls input{
      flex:1;
      border:none;
      border-radius:12px;
      padding:12px 14px;
      font-size:15px;
      outline:none;
    }

    .scan-controls button{
      border:none;
      border-radius:12px;
      width:52px;
      background:#1d4ed8;
      color:#fff;
      font-size:20px;
      cursor:pointer;
    }

    .form-group{margin-bottom:14px}
    .form-label{
      display:block;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.4px;
      color:var(--muted);
      font-weight:700;
      margin-bottom:7px;
    }

    .input{
      width:100%;
      border:2px solid #e3e7ec;
      border-radius:12px;
      padding:13px 14px;
      font-size:15px;
      outline:none;
      background:#fff;
    }

    .qty-row{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .qty-row button{
      width:48px;
      height:48px;
      border:none;
      border-radius:12px;
      background:var(--green);
      color:#fff;
      font-size:24px;
      cursor:pointer;
    }

    .qty-row input{
      flex:1;
      text-align:center;
      font-size:18px;
      font-weight:700;
      border:2px solid #e3e7ec;
      border-radius:12px;
      padding:11px;
      outline:none;
      background:#fff;
    }

    .save-btn{
      background:var(--ok);
      color:#fff;
      padding:16px;
      font-weight:800;
      margin-top:4px;
    }

    .actions{
      padding:16px;
    }

    .stock-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-bottom:8px;
    }

    .stock-square{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      background:#fff;
      border:2px solid #e4e7eb;
      border-radius:16px;
      padding:22px 12px;
      min-height:132px;
      box-shadow:var(--shadow);
      cursor:pointer;
      text-align:center;
      font-weight:800;
      font-size:14px;
    }

    .stock-square.disabled{
      opacity:.6;
      cursor:default;
      background:#f8f9fa;
    }

    .stock-emoji{
      font-size:34px;
      margin-bottom:10px;
    }

    .stock-soon{
      margin-top:6px;
      color:var(--muted);
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.4px;
      font-weight:700;
    }

    .ghost-btn{
      background:#fff;
      padding:15px;
      text-align:center;
      border:2px dashed #cfd6dd;
      font-weight:700;
      color:var(--muted);
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:24px;
      transform:translateX(-50%) translateY(20px);
      background:#111827;
      color:#fff;
      padding:12px 18px;
      border-radius:999px;
      font-size:14px;
      opacity:0;
      pointer-events:none;
      transition:.25s ease;
      z-index:100;
      white-space:nowrap;
    }

    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    .overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.88);
      display:none;
      z-index:90;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .overlay.show{display:flex}

    .overlay video{
      width:100%;
      max-width:420px;
      border-radius:18px;
      background:#000;
    }

    .overlay-tools{
      width:100%;
      max-width:420px;
      margin-top:12px;
      display:flex;
      gap:10px;
    }

    .overlay-tools input{
      flex:1;
      border:none;
      border-radius:12px;
      padding:12px;
      font-size:15px;
      outline:none;
    }

    .overlay-tools button{
      border:none;
      border-radius:12px;
      padding:12px 14px;
      cursor:pointer;
      font-weight:700;
    }

    .overlay-close{background:#fff}
    .overlay-confirm{background:var(--green); color:#fff}

    .muted{
      color:var(--muted);
      font-size:13px;
    }

    .location-btn{
      border:none;
      border-radius:12px;
      min-height:44px;
      background:#f3f4f6;
      color:#111827;
      font-weight:700;
      cursor:pointer;
      border:2px solid #e5e7eb;
    }

    .location-btn.active{
      background:var(--green);
      color:#fff;
      border-color:var(--green);
    }
  </style>
</head>
<body>

  <div class="toast" id="toast"></div>

  <!-- PAGE 1 -->
  <section class="screen active" id="page-home">

    <!-- HERO PHOTO -->
    <div style="
      position:relative;
      min-height:280px;
      background:url('assets/team-photo.jpg') center/cover no-repeat;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-end;
      padding:0 20px 28px;
      overflow:hidden;
    ">
      <!-- Dégradé sombre -->
      <div style="position:absolute;inset:0;background:linear-gradient(to bottom,rgba(20,40,32,.3) 0%,rgba(20,40,32,.82) 100%);"></div>

      <!-- Logo + texte par-dessus le dégradé -->
      <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:10px;">
        <img src="assets/logo-breakpoint.png" alt="logo" style="
          width:72px;height:72px;
          border-radius:50%;
          object-fit:contain;
          background:rgba(255,255,255,.15);
          padding:7px;
          box-shadow:0 6px 22px rgba(0,0,0,.35);
        "/>
        <div style="text-align:center;">
          <div style="color:#fff;font-size:21px;font-weight:900;letter-spacing:-.2px;">Breakpoint OPS</div>
          <div style="color:rgba(255,255,255,.7);font-size:12px;font-weight:600;margin-top:2px;">Sélectionnez votre station</div>
        </div>
      </div>
    </div>

    <!-- STATIONS -->
    <div style="padding:18px 14px 36px;">

      <!-- Grille 2 colonnes pour 6 stations -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">

        <button onclick="selectStation('Evere')" style="background:#fff;border:none;border-radius:16px;padding:18px 10px 14px;box-shadow:0 2px 12px rgba(0,0,0,.08);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;font-family:inherit;transition:transform .1s;" onpointerdown="this.style.transform='scale(.97)'" onpointerup="this.style.transform=''" onpointerleave="this.style.transform=''">
          <div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#2d4a3e,#3d6354);display:flex;align-items:center;justify-content:center;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round"><path d="M3 22V8l9-6 9 6v14"/><path d="M9 22V12h6v10"/></svg>
          </div>
          <div style="font-size:13px;font-weight:800;color:#111827;">Evere</div>
          <div style="font-size:10px;color:#9ca3af;font-weight:600;text-transform:uppercase;letter-spacing:.5px;">Station</div>
        </button>

        <button onclick="selectStation('Wemmel')" style="background:#fff;border:none;border-radius:16px;padding:18px 10px 14px;box-shadow:0 2px 12px rgba(0,0,0,.08);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;font-family:inherit;transition:transform .1s;" onpointerdown="this.style.transform='scale(.97)'" onpointerup="this.style.transform=''" onpointerleave="this.style.transform=''">
          <div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#2d4a3e,#3d6354);display:flex;align-items:center;justify-content:center;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round"><path d="M3 22V8l9-6 9 6v14"/><path d="M9 22V12h6v10"/></svg>
          </div>
          <div style="font-size:13px;font-weight:800;color:#111827;">Wemmel</div>
          <div style="font-size:10px;color:#9ca3af;font-weight:600;text-transform:uppercase;letter-spacing:.5px;">Station</div>
        </button>

        <button onclick="selectStation('Molenbeek')" style="background:#fff;border:none;border-radius:16px;padding:18px 10px 14px;box-shadow:0 2px 12px rgba(0,0,0,.08);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;font-family:inherit;transition:transform .1s;" onpointerdown="this.style.transform='scale(.97)'" onpointerup="this.style.transform=''" onpointerleave="this.style.transform=''">
          <div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#2d4a3e,#3d6354);display:flex;align-items:center;justify-content:center;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round"><path d="M3 22V8l9-6 9 6v14"/><path d="M9 22V12h6v10"/></svg>
          </div>
          <div style="font-size:13px;font-weight:800;color:#111827;">Molenbeek</div>
          <div style="font-size:10px;color:#9ca3af;font-weight:600;text-transform:uppercase;letter-spacing:.5px;">Station</div>
        </button>

        <button onclick="selectStation('Fort-Jaco')" style="background:#fff;border:none;border-radius:16px;padding:18px 10px 14px;box-shadow:0 2px 12px rgba(0,0,0,.08);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;font-family:inherit;transition:transform .1s;" onpointerdown="this.style.transform='scale(.97)'" onpointerup="this.style.transform=''" onpointerleave="this.style.transform=''">
          <div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#2d4a3e,#3d6354);display:flex;align-items:center;justify-content:center;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round"><path d="M3 22V8l9-6 9 6v14"/><path d="M9 22V12h6v10"/></svg>
          </div>
          <div style="font-size:13px;font-weight:800;color:#111827;">Fort-Jaco</div>
          <div style="font-size:10px;color:#9ca3af;font-weight:600;text-transform:uppercase;letter-spacing:.5px;">Station</div>
        </button>

        <button onclick="selectStation('Uccle')" style="background:#fff;border:none;border-radius:16px;padding:18px 10px 14px;box-shadow:0 2px 12px rgba(0,0,0,.08);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;font-family:inherit;transition:transform .1s;" onpointerdown="this.style.transform='scale(.97)'" onpointerup="this.style.transform=''" onpointerleave="this.style.transform=''">
          <div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#2d4a3e,#3d6354);display:flex;align-items:center;justify-content:center;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round"><path d="M3 22V8l9-6 9 6v14"/><path d="M9 22V12h6v10"/></svg>
          </div>
          <div style="font-size:13px;font-weight:800;color:#111827;">Uccle</div>
          <div style="font-size:10px;color:#9ca3af;font-weight:600;text-transform:uppercase;letter-spacing:.5px;">Station</div>
        </button>

        <button onclick="selectStation('Etterbeek')" style="background:#fff;border:none;border-radius:16px;padding:18px 10px 14px;box-shadow:0 2px 12px rgba(0,0,0,.08);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;font-family:inherit;transition:transform .1s;" onpointerdown="this.style.transform='scale(.97)'" onpointerup="this.style.transform=''" onpointerleave="this.style.transform=''">
          <div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#2d4a3e,#3d6354);display:flex;align-items:center;justify-content:center;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round"><path d="M3 22V8l9-6 9 6v14"/><path d="M9 22V12h6v10"/></svg>
          </div>
          <div style="font-size:13px;font-weight:800;color:#111827;">Etterbeek</div>
          <div style="font-size:10px;color:#9ca3af;font-weight:600;text-transform:uppercase;letter-spacing:.5px;">Station</div>
        </button>

      </div>

      <!-- Auderghem centré -->
      <div style="display:flex;justify-content:center;">
        <button onclick="selectStation('Auderghem')" style="background:#fff;border:none;border-radius:16px;padding:18px 10px 14px;box-shadow:0 2px 12px rgba(0,0,0,.08);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;font-family:inherit;transition:transform .1s;width:calc(50% - 5px);" onpointerdown="this.style.transform='scale(.97)'" onpointerup="this.style.transform=''" onpointerleave="this.style.transform=''">
          <div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#2d4a3e,#3d6354);display:flex;align-items:center;justify-content:center;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round"><path d="M3 22V8l9-6 9 6v14"/><path d="M9 22V12h6v10"/></svg>
          </div>
          <div style="font-size:13px;font-weight:800;color:#111827;">Auderghem</div>
          <div style="font-size:10px;color:#9ca3af;font-weight:600;text-transform:uppercase;letter-spacing:.5px;">Station</div>
        </button>
      </div>

    </div>
  </section>

  <!-- PAGE 2 -->
  <section class="screen" id="page-modules">
    <div class="topbar">
      <button class="back-btn" onclick="goHome()">‹</button>
      <div>
        <div class="topbar-title" id="top-station-name">Station</div>
        <div class="topbar-sub">Choisissez un module</div>
      </div>
    </div>

    <div class="hero-station">
      <div>
        <h2 class="hero-station-title" id="hero-station-name">Station</h2>
        <p class="hero-station-sub">Choisissez un module</p>
      </div>
    </div>

    <div class="module-list">
      <button class="module-btn stock" onclick="goStockHome()">
        <span>
          Gestion de stock
          <span class="sub">DLC · Réception · Alertes · Transferts</span>
        </span>
        <span>›</span>
      </button>

      <button class="module-btn orange" type="button">
        <span>
          Boulangerie
          <span class="sub">Étiquettes DLC · Suivi production</span>
        </span>
        <span class="badge-soon">Bientôt</span>
      </button>

      <button class="module-btn gray" type="button">
        <span>
          Maintenance
          <span class="sub">Rapport d'incident · Demande d'intervention</span>
        </span>
        <span class="badge-soon">Bientôt</span>
      </button>
    </div>
  </section>

  <!-- PAGE 3 -->
  <section class="screen" id="page-stock-home">
    <div class="topbar">
      <button class="back-btn" onclick="goModules()">‹</button>
      <div>
        <div class="topbar-title">Gestion de stock</div>
        <div class="topbar-sub" id="stock-station-name">Station</div>
      </div>
    </div>

    <div class="actions">
      <div class="stock-grid">
        <button class="stock-square" onclick="goReception()">
          <div class="stock-emoji">📦</div>
          <div>Réception livraison</div>
        </button>

        <button class="stock-square" onclick="goAlerts()">
          <div class="stock-emoji">⚠️</div>
          <div>Alertes DLC</div>
        </button>
      </div>

      <div class="stock-grid">
        <button class="stock-square disabled" type="button">
          <div class="stock-emoji">🔄</div>

        <button class="stock-square disabled" type="button">

  <!-- PAGE 4 -->
  <section class="screen" id="page-reception">
    <div class="topbar">
      <button class="back-btn" onclick="goStockHome()">‹</button>
      <div>
        <div class="topbar-title">Réception livraison</div>

      </div>
    </div>

    <div class="section">
      <div class="scan-card">
        <div id="scanLive" style="position:relative;min-height:200px;background:#000;border-radius:18px 18px 0 0;overflow:hidden;display:flex;align-items:center;justify-content:center;">
          <video id="scannerVideoInline" autoplay muted playsinline style="width:100%;max-height:240px;object-fit:cover;display:none;"></video>
          <div id="scanPlaceholder" style="display:flex;flex-direction:column;align-items:center;gap:12px;padding:24px;cursor:pointer;" onclick="startInlineScanner()">
            <div class="scan-box"><div class="scan-line"></div></div>
            <div style="font-size:13px;opacity:.7;">Appuyez pour activer la caméra</div>
          </div>
          <div id="scanCorners" style="display:none;position:absolute;inset:0;pointer-events:none;">

              <polyline points="8,80 8,92 20,92" fill="none" stroke="#22c55e" stroke-width="2"/>

          <button id="scanStopBtn" onclick="stopInlineScanner()" style="display:none;position:absolute;top:10px;right:10px;border:none;background:rgba(255,255,255,.18);color:#fff;border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;">✕ Stop</button>
          <!-- Panneau confirmation scan douteux -->
          <div id="scanConfirmPanel" style="display:none;position:absolute;bottom:0;left:0;right:0;background:rgba(17,24,39,.92);padding:12px 14px;text-align:center;">
            <div id="scanConfirmCode" style="color:#fff;font-size:13px;font-weight:700;margin-bottom:10px;"></div>
            <div style="display:flex;gap:8px;justify-content:center;">
              <button onclick="confirmScanCode()" style="border:none;border-radius:10px;padding:9px 18px;background:#22c55e;color:#fff;font-weight:800;font-size:13px;cursor:pointer;font-family:inherit;">✅ Confirmer</button>
              <button onclick="dismissScanConfirm()" style="border:none;border-radius:10px;padding:9px 18px;background:rgba(255,255,255,.18);color:#fff;font-weight:800;font-size:13px;cursor:pointer;font-family:inherit;">🔄 Scanner encore</button>

        <div class="scan-controls">
          <input
            id="eanInput"
            type="text"
            inputmode="numeric"
            placeholder="Saisir le code EAN manuellement..."
            oninput="onManualEAN(this.value)"
          />

        </div>

      <div class="card">
        <div style="display:flex; gap:14px; align-items:flex-start; margin-bottom:16px;">
          <div
            id="productPhotoBox"
            onclick="document.getElementById('photoInput').click()"
            style="
              width:78px;
              height:78px;
              border-radius:14px;
              border:2px dashed #d6dbe1;
              background:#f8fafc;
              display:flex;
              align-items:center;
              justify-content:center;
              overflow:hidden;
              font-size:30px;
              flex-shrink:0;
              cursor:pointer;
            "
          >📦</div>

          <div style="flex:1;">
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label">Nom du produit</label>
              <input class="input" id="nameInput" type="text" placeholder="Nom du produit" />
            </div>
          </div>
        </div>

        <input id="photoInput" type="file" accept="image/*" style="display:none" onchange="handlePhotoUpload(event)" />

        <div class="form-group">
          <label class="form-label">Date limite de consommation</label>
          <input class="input" id="dlcInput" type="date" />
        </div>

        <div class="form-group">
          <label class="form-label">Quantité</label>
          <div class="qty-row">
            <button onclick="changeQty(-1)">−</button>
            <input id="qtyInput" type="number" min="1" value="1" />
            <button onclick="changeQty(1)">+</button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Emplacement(s)</label>
          <div id="locationGrid" style="display:grid; grid-template-columns:repeat(6,1fr); gap:8px;"></div>
        </div>

        <button class="save-btn" onclick="saveProduct()">✅ Enregistrer</button>
      </div>

  </section>

  <!-- PAGE 5 — ALERTES DLC -->
  <section class="screen" id="page-alerts">
    <div class="topbar">
      <button class="back-btn" onclick="goStockHome()">‹</button>
      <div style="flex:1;">
        <div class="topbar-title">Alertes DLC</div>
        <div class="topbar-sub" id="alerts-station-name">Station</div>
      </div>
      <div id="alertsBadge" style="background:#ef4444;color:#fff;font-size:12px;font-weight:800;border-radius:999px;padding:3px 9px;display:none;"></div>
    </div>
    <div style="padding:14px 14px 8px;display:flex;justify-content:flex-end;">
      <button onclick="goHistory()" style="border:none;background:#f3f4f6;border-radius:10px;padding:8px 14px;font-size:12px;font-weight:700;color:#374151;cursor:pointer;font-family:inherit;">📋 Historique</button>
    </div>
    <div style="padding:4px 14px 32px;">
      <div id="alertsList" style="display:grid;gap:11px;"></div>
    </div>
  </section>

  <!-- PAGE 6 — HISTORIQUE DLC -->
  <section class="screen" id="page-history">
    <div class="topbar">
      <button class="back-btn" onclick="goAlerts()">‹</button>
      <div style="flex:1;">
        <div class="topbar-title">Historique DLC</div>
        <div class="topbar-sub" id="history-station-name">Station</div>
      </div>
    </div>
    <div style="padding:14px 14px 32px;">
      <div id="historyList" style="display:grid;gap:11px;"></div>
    </div>
  </section>

  <script>
    const SUPABASE_URL = "https://hhsvazolktxqntyhuqqj.supabase.co";
    const SUPABASE_KEY = "sb_publishable_qr4Qq4OB-Qt1G8a0GO3WKw_IJxfRbl9";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const state = {
      station: null,
      stream: null,
      scanTimer: null,
      barcodeDetector: null,
      selectedLocations: [],
      photoDataUrl: null,
      quaggaRunning: false,
      saving: false
    };

    /* ══ NAVIGATION ══ */
    function showPage(id){
      document.querySelectorAll(".screen").forEach(el => el.classList.remove("active"));
      document.getElementById(id).classList.add("active");
      window.scrollTo({top:0, behavior:"instant"});
    }

    function selectStation(name){
      state.station = name;
      document.getElementById("top-station-name").textContent    = name;
      document.getElementById("hero-station-name").textContent   = name;
      document.getElementById("stock-station-name").textContent  = name;
      document.getElementById("reception-station-name").textContent = name;
      showPage("page-modules");
    }

    function goHome()      { showPage("page-home"); }
    function goModules()   { showPage("page-modules"); }
    function goStockHome() { showPage("page-stock-home"); }
    function goReception() { showPage("page-reception"); }

    function goAlerts(){
      document.getElementById("alerts-station-name").textContent = state.station || "Station";
      showPage("page-alerts");
      loadAlerts();
    }

    function goHistory(){
      document.getElementById("history-station-name").textContent = state.station || "Station";
      showPage("page-history");
      loadHistory();
    }

    /* ══ TOAST ══ */
    function showToast(message){
      const t = document.getElementById("toast");
      t.textContent = message;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2600);
    }

    /* ══ FORMULAIRE RECEPTION ══ */
    function changeQty(delta){
      const input = document.getElementById("qtyInput");
      input.value = Math.max(1, (parseInt(input.value || "1", 10)) + delta);
    }

    function setTodayMinDate(){
      document.getElementById("dlcInput").min = new Date().toISOString().split("T")[0];
    }
    setTodayMinDate();

    function buildLocationGrid(){
      const grid = document.getElementById("locationGrid");
      if (!grid) return;
      grid.innerHTML = "";
      "ABCDEFGHIJKL".split("").forEach(letter => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "location-btn";
        btn.textContent = letter;
        btn.onclick = () => {
          if (state.selectedLocations.includes(letter)){
            state.selectedLocations = state.selectedLocations.filter(l => l !== letter);
            btn.classList.remove("active");
          } else {
            state.selectedLocations.push(letter);
            btn.classList.add("active");
          }
        };
        grid.appendChild(btn);
      });
    }

    function resetLocationGrid(){
      state.selectedLocations = [];
      document.querySelectorAll(".location-btn").forEach(b => b.classList.remove("active"));
    }

    function handlePhotoUpload(event){
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        state.photoDataUrl = e.target.result;
        document.getElementById("productPhotoBox").innerHTML =
          `<img src="${state.photoDataUrl}" alt="Produit" style="width:100%;height:100%;object-fit:cover;">`;
      };
      reader.readAsDataURL(file);
    }

    function resetPhotoBox(){
      state.photoDataUrl = null;
      document.getElementById("productPhotoBox").innerHTML = "📦";
      document.getElementById("photoInput").value = "";
    }

    function onManualEAN(value){
      const ean = String(value || "").trim();
      if (ean.length >= 8) loadProductByEAN(ean);
    }

    async function loadProductByEAN(ean){
      try {
        const { data } = await supabaseClient
          .from("produits").select("*").eq("ean", ean).maybeSingle();
        if (data && data.nom){
          document.getElementById("nameInput").value = data.nom;
          if (data.photo){
            state.photoDataUrl = null; // produit déjà connu
            document.getElementById("productPhotoBox").innerHTML =
              `<img src="${data.photo}" style="width:100%;height:100%;object-fit:cover;">`;
          }
          showToast("✅ Produit trouvé");
        }
      } catch(e){ console.error(e); }
    }

    /* ══ SAVE PRODUCT ══ */
    async function saveProduct(){
      if (state.saving) return;

      const ean      = document.getElementById("eanInput").value.trim();
      const nom      = document.getElementById("nameInput").value.trim();
      const dlc      = document.getElementById("dlcInput").value;
      const quantite = parseInt(document.getElementById("qtyInput").value || "1", 10);
      const station  = state.station;

      if (!station)                      { showToast("Aucune station sélectionnée"); return; }
      if (!ean)                          { showToast("⚠️ Code EAN requis");          return; }
      if (!nom)                          { showToast("⚠️ Nom produit requis");       return; }
      if (!dlc)                          { showToast("⚠️ DLC requise");              return; }
      if (!state.selectedLocations.length){ showToast("⚠️ Choisis un emplacement"); return; }

      state.saving = true;
      const btn = document.querySelector(".save-btn");
      if (btn){ btn.disabled = true; btn.textContent = "⏳ Enregistrement..."; }

      try {
        /* 1. Produit */
        const { data: existingProd } = await supabaseClient
          .from("produits").select("ean,photo").eq("ean", ean).maybeSingle();

        if (!existingProd){
          let photoUrl = null;
          if (state.photoDataUrl){
            const fileName = `${ean}-${Date.now()}.jpg`;
            const { error: upErr } = await supabaseClient.storage
              .from("produits").upload(fileName, dataURLtoBlob(state.photoDataUrl));
            if (!upErr)
              photoUrl = `${SUPABASE_URL}/storage/v1/object/public/produits/${fileName}`;
          }
          const { error: pErr } = await supabaseClient
            .from("produits").insert([{ ean, nom, photo: photoUrl }]);
          if (pErr){ showToast("❌ Erreur produit : " + pErr.message); return; }

        } else if (!existingProd.photo && state.photoDataUrl){
          const fileName = `${ean}-${Date.now()}.jpg`;
          const { error: upErr } = await supabaseClient.storage
            .from("produits").upload(fileName, dataURLtoBlob(state.photoDataUrl));
          if (!upErr){
            const photoUrl = `${SUPABASE_URL}/storage/v1/object/public/produits/${fileName}`;
            await supabaseClient.from("produits").update({ photo: photoUrl }).eq("ean", ean);
          }
        }

        /* 2. Lot */
        const { data: existingLot } = await supabaseClient
          .from("lots").select("id,quantite")
          .eq("ean", ean).eq("station", station).eq("dlc", dlc).eq("statut", "actif")
          .maybeSingle();

        if (existingLot){
          const newQty = existingLot.quantite + quantite;
          const { error: lErr } = await supabaseClient
            .from("lots").update({ quantite: newQty }).eq("id", existingLot.id);
          if (lErr){ showToast("❌ Erreur lot : " + lErr.message); return; }
          showToast(`✅ Quantité mise à jour (${newQty} unités)`);
        } else {
          const { error: lErr } = await supabaseClient
            .from("lots").insert([{
              ean, station, dlc, quantite,
              statut: "actif",
              emplacements: [...state.selectedLocations]
            }]);
          if (lErr){ showToast("❌ Erreur lot : " + lErr.message); return; }
          showToast("✅ Lot enregistré");
        }

        /* 3. Reset */
        document.getElementById("eanInput").value  = "";
        document.getElementById("nameInput").value = "";
        document.getElementById("qtyInput").value  = "1";
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById("dlcInput").value = tomorrow.toISOString().split("T")[0];
        resetPhotoBox();
        resetLocationGrid();

      } catch(err){
        console.error(err);
        showToast("❌ " + err.message);
      } finally {
        state.saving = false;
        if (btn){ btn.disabled = false; btn.textContent = "✅ Enregistrer"; }
      }
    }

    /* ══ ALERTES DLC ══ */
    async function loadAlerts(){
      const list  = document.getElementById("alertsList");
      const badge = document.getElementById("alertsBadge");
      list.innerHTML = `<div style="text-align:center;padding:32px 0;color:#9ca3af;font-size:14px;">⏳ Chargement...</div>`;
      if (!state.station){
        list.innerHTML = `<div class="card"><div class="muted">Aucune station sélectionnée.</div></div>`;
        return;
      }
      const { data, error } = await supabaseClient
        .from("v_alertes_dlc")
        .select("id,ean,nom,photo,station,dlc,quantite,statut,created_at,jours_restants")
        .eq("station", state.station)
        .order("jours_restants", { ascending: true });

      if (error){
        list.innerHTML = `<div class="card"><div class="muted">❌ ${error.message}</div></div>`;
        return;
      }
      if (!data || data.length === 0){
        if (badge) badge.style.display = "none";
        list.innerHTML = `
          <div style="text-align:center;padding:52px 20px;">
            <div style="font-size:52px;margin-bottom:12px;">🎉</div>
            <div style="font-size:16px;font-weight:800;color:#111827;margin-bottom:6px;">Aucune alerte !</div>
            <div style="font-size:13px;color:#9ca3af;">Tous les produits sont dans les délais.</div>
          </div>`;
        return;
      }
      if (badge){ badge.textContent = data.length; badge.style.display = "inline"; }
      list.innerHTML = data.map(item => renderAlertCard(item)).join("");
    }

    function renderAlertCard(item){
      const j = item.jours_restants;
      const isExpired = j <= 0;
      const isUrgent  = j === 1;
      const pillColor = isExpired ? "#ef4444" : isUrgent ? "#f97316" : "#f59e0b";
      const pillBg    = isExpired ? "#fef2f2" : isUrgent ? "#fff7ed" : "#fffbeb";
      const pillText  = isExpired ? "⛔ EXPIRÉ" : isUrgent ? "⚠️ Expire demain" : `⚠️ ${j} jours restants`;
      const border    = isExpired ? "#fca5a5" : isUrgent ? "#fdba74" : "#fcd34d";
      const dlcFmt    = new Date(item.dlc).toLocaleDateString("fr-BE",{day:"2-digit",month:"2-digit",year:"numeric"});
      const photoHtml = item.photo
        ? `<img src="${item.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:12px;">`
        : `<div style="font-size:28px;display:flex;align-items:center;justify-content:center;height:100%;">📦</div>`;
      return `
        <div id="alert-card-${item.id}" style="background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.08);border-left:4px solid ${border};padding:14px;display:flex;flex-direction:column;gap:10px;">
          <div style="display:flex;gap:12px;align-items:flex-start;">
            <div style="width:62px;height:62px;border-radius:12px;border:1.5px solid #f3f4f6;overflow:hidden;flex-shrink:0;background:#f9fafb;">${photoHtml}</div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:15px;font-weight:800;color:#111827;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${item.nom || item.ean}</div>
              <div style="font-size:12px;color:#6b7280;margin-bottom:6px;">${item.quantite} unité${item.quantite>1?"s":""} &nbsp;·&nbsp; DLC : ${dlcFmt}</div>
              <span style="display:inline-block;background:${pillBg};color:${pillColor};border:1px solid ${border};border-radius:999px;padding:3px 10px;font-size:11px;font-weight:800;">${pillText}</span>
            </div>
          </div>
          <div style="display:flex;gap:7px;border-top:1px solid #f3f4f6;padding-top:10px;flex-wrap:wrap;">
            <button onclick="marquerTraite('${item.id}')" style="flex:1;min-width:120px;border:none;border-radius:10px;padding:10px 0;background:#dcfce7;color:#16a34a;font-weight:800;font-size:12px;cursor:pointer;font-family:inherit;">✅ Marquer traité</button>
            <button onclick="corrigerQuantite('${item.id}',${item.quantite})" style="flex:1;min-width:100px;border:none;border-radius:10px;padding:10px 0;background:#eff6ff;color:#2563eb;font-weight:800;font-size:12px;cursor:pointer;font-family:inherit;">✏️ Corriger qté</button>
            <button onclick="supprimerLot('${item.id}')" style="width:42px;border:none;border-radius:10px;background:#fee2e2;color:#ef4444;font-size:16px;cursor:pointer;font-family:inherit;">🗑</button>
          </div>
        </div>`;
    }

    async function marquerTraite(id){
      const { error } = await supabaseClient.rpc("marquer_lot_traite", { p_lot_id: Number(id) });
      if (error){ showToast("❌ " + error.message); return; }
      showToast("✅ Lot marqué comme traité");
      loadAlerts();
    }

    async function supprimerLot(id){
      if (!confirm("Supprimer ce lot définitivement ?")) return;
      const { error } = await supabaseClient.rpc("supprimer_lot", { p_lot_id: Number(id) });
      if (error){ showToast("❌ " + error.message); return; }
      showToast("🗑 Lot supprimé");
      loadAlerts();
    }

    async function corrigerQuantite(id, qteActuelle){
      const val = prompt(`Nouvelle quantité (actuelle : ${qteActuelle})`, qteActuelle);
      if (val === null) return;
      const newQty = parseInt(val, 10);
      if (isNaN(newQty) || newQty < 0){ showToast("⚠️ Quantité invalide"); return; }
      showToast("⏳ Correction...");
      console.log("corrigerQuantite → id:", id, "newQty:", newQty);
      const { data, error } = await supabaseClient.rpc("corriger_quantite_lot", { p_lot_id: Number(id), p_quantite: newQty });
      console.log("corrigerQuantite → data:", data, "error:", error);
      if (error){ showToast("❌ " + JSON.stringify(error)); return; }
      showToast(`✅ Quantité corrigée : ${newQty}`);
      loadAlerts();
    }

    /* ══ HISTORIQUE DLC ══ */
    async function loadHistory(){
      const list = document.getElementById("historyList");
      list.innerHTML = `<div style="text-align:center;padding:32px 0;color:#9ca3af;font-size:14px;">⏳ Chargement...</div>`;
      if (!state.station){
        list.innerHTML = `<div class="card"><div class="muted">Aucune station sélectionnée.</div></div>`;
        return;
      }
      const { data, error } = await supabaseClient
        .from("v_alertes_dlc_historique")
        .select("*")
        .eq("station", state.station)
        .order("created_at", { ascending: false });

      if (error){
        list.innerHTML = `<div class="card"><div class="muted">❌ ${error.message}</div></div>`;
        return;
      }
      if (!data || data.length === 0){
        list.innerHTML = `
          <div style="text-align:center;padding:52px 20px;">
            <div style="font-size:48px;margin-bottom:12px;">📋</div>
            <div style="font-size:16px;font-weight:800;color:#111827;margin-bottom:6px;">Aucun historique</div>
            <div style="font-size:13px;color:#9ca3af;">Aucun historique sur les 10 derniers jours</div>
          </div>`;
        return;
      }
      list.innerHTML = data.map(item => {
        const dlcFmt = new Date(item.dlc).toLocaleDateString("fr-BE",{day:"2-digit",month:"2-digit",year:"numeric"});
        const isTraite   = item.statut === "traite";
        const isSupp     = item.statut === "supprime" || item.statut === "deleted";
        const isExpire   = item.statut === "expire";
        const badgeBg    = isTraite ? "#dcfce7" : isSupp ? "#fee2e2" : "#fef9c3";
        const badgeColor = isTraite ? "#16a34a" : isSupp ? "#ef4444" : "#92400e";
        const badgeText  = isTraite ? "✅ Traité" : isSupp ? "🗑 Supprimé" : "⛔ Expiré";
        const border     = isTraite ? "#86efac" : isSupp ? "#fca5a5" : "#fde68a";
        const actionDate = item.traite_at || item.deleted_at || item.updated_at || item.created_at;
        const dateFmt    = actionDate
          ? new Date(actionDate).toLocaleDateString("fr-BE",{day:"2-digit",month:"2-digit",year:"numeric"})
          : "—";
        const photoHtml = item.photo
          ? `<img src="${item.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:10px;">`
          : `<div style="font-size:24px;display:flex;align-items:center;justify-content:center;height:100%;">📦</div>`;
        return `
          <div style="background:#fff;border-radius:16px;box-shadow:0 2px 10px rgba(0,0,0,.07);border-left:4px solid ${border};padding:13px;display:flex;gap:12px;align-items:flex-start;opacity:${isSupp?".7":"1"};">
            <div style="width:52px;height:52px;border-radius:10px;border:1.5px solid #f3f4f6;overflow:hidden;flex-shrink:0;background:#f9fafb;">${photoHtml}</div>
            <div style="flex:1;min-width:0;">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap;">
                <div style="font-size:14px;font-weight:800;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${item.nom || item.ean}</div>
                <span style="background:${badgeBg};color:${badgeColor};border-radius:999px;padding:2px 9px;font-size:10px;font-weight:800;white-space:nowrap;">${badgeText}</span>
              </div>
              <div style="font-size:11px;color:#6b7280;">${item.quantite} unité${item.quantite>1?"s":""} &nbsp;·&nbsp; DLC : ${dlcFmt}</div>
              <div style="font-size:11px;color:#9ca3af;margin-top:2px;">Le ${dateFmt}</div>
            </div>
          </div>`;
      }).join("");
    }

    /* ══ SCANNER INLINE ══ */
    function loadScript(src){
      return new Promise((res,rej) => {
        if (document.querySelector(`script[src="${src}"]`)){ res(); return; }
        const s = document.createElement("script");
        s.src = src; s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }

    /* ── Logique scan fiable : même code 2 fois de suite, chiffres uniquement, 8 ou 13 digits ── */
    function isValidEAN(code){
      return /^[0-9]{8}$|^[0-9]{13}$/.test(code);
    }

    function acceptScanCode(value){
      document.getElementById("eanInput").value = value;
      if (navigator.vibrate) navigator.vibrate(100);
      stopInlineScanner();
      loadProductByEAN(value);
      showToast("✅ Code scanné : " + value);
    }

    function showScanConfirm(value){
      const panel = document.getElementById("scanConfirmPanel");
      const label = document.getElementById("scanConfirmCode");
      label.textContent = "Code détecté : " + value;
      panel.dataset.code = value;
      panel.style.display = "block";
      document.getElementById("scanStatusBadge").style.display = "none";
    }

    function confirmScanCode(){
      const panel = document.getElementById("scanConfirmPanel");
      const value = panel.dataset.code;
      if (value) acceptScanCode(value);
    }

    function dismissScanConfirm(){
      const panel = document.getElementById("scanConfirmPanel");
      panel.style.display = "none";
      panel.dataset.code = "";
      document.getElementById("scanStatusBadge").style.display = "block";
      document.getElementById("scanStatusBadge").textContent = "Recherche...";
      state.lastScanCode = null;
    }

    function processScanResult(code){
      if (!code) return;
      // Format valide EAN8 ou EAN13 uniquement chiffres
      if (!isValidEAN(code)){
        // format douteux → confirmation
        showScanConfirm(code);
        return;
      }
      // Fiabilité : même code détecté 2 fois consécutives
      if (state.lastScanCode === code){
        // Confirmé 2x → auto
        state.lastScanCode = null;
        acceptScanCode(code);
      } else {
        state.lastScanCode = code;
        document.getElementById("scanStatusBadge").textContent = "Code détecté, vérification...";
      }
    }

    async function startInlineScanner(){
      const video       = document.getElementById("scannerVideoInline");
      const placeholder = document.getElementById("scanPlaceholder");
      const corners     = document.getElementById("scanCorners");
      const statusBadge = document.getElementById("scanStatusBadge");
      const stopBtn     = document.getElementById("scanStopBtn");
      state.lastScanCode = null;
      document.getElementById("scanConfirmPanel").style.display = "none";

      try {
        state.stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode:{ideal:"environment"}, width:{ideal:1280}, height:{ideal:720} },
          audio: false
        });
        video.srcObject = state.stream;
        video.style.display = "block";
        placeholder.style.display = "none";
        corners.style.display = "block";
        statusBadge.style.display = "block";
        statusBadge.textContent = "Recherche...";
        stopBtn.style.display = "block";

        if ("BarcodeDetector" in window){
          state.barcodeDetector = new BarcodeDetector({ formats:["ean_13","ean_8","code_128","upc_a","upc_e"] });
          state.scanTimer = setInterval(async () => {
            try {
              const codes = await state.barcodeDetector.detect(video);
              if (codes && codes.length > 0) processScanResult(codes[0].rawValue);
            } catch(e){}
          }, 500);
        } else {
          statusBadge.textContent = "Chargement scanner...";
          await loadScript("https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js");
          statusBadge.textContent = "Pointez vers le code-barres";
          Quagga.init({
            inputStream:{ name:"Live", type:"LiveStream", target:video, constraints:{facingMode:"environment"} },
            decoder:{ readers:["ean_reader","ean_8_reader","code_128_reader","upc_reader"] },
            locate:true, frequency:10
          }, err => { if (!err) Quagga.start(); });
          Quagga.onDetected(data => {
            const raw = data.codeResult.code;
            processScanResult(raw);
          });
          state.quaggaRunning = true;
        }
      } catch(err){
        showToast("⚠️ Caméra indisponible");
        placeholder.style.display = "flex";
        video.style.display = "none";
        corners.style.display = "none";
        statusBadge.style.display = "none";
        stopBtn.style.display = "none";
      }
    }

    function stopInlineScanner(){
      if (state.scanTimer){ clearInterval(state.scanTimer); state.scanTimer = null; }
      if (state.quaggaRunning){ try{ Quagga.stop(); }catch(e){} state.quaggaRunning = false; }
      if (state.stream){ state.stream.getTracks().forEach(t => t.stop()); state.stream = null; }
      const video = document.getElementById("scannerVideoInline");
      if (video) video.srcObject = null;
      video.style.display = "none";
      document.getElementById("scanPlaceholder").style.display = "flex";
      document.getElementById("scanCorners").style.display = "none";
      document.getElementById("scanStatusBadge").style.display = "none";
      document.getElementById("scanStopBtn").style.display = "none";
    }

    /* ══ INIT ══ */
    (function initDefaultDate(){
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      document.getElementById("dlcInput").value = tomorrow.toISOString().split("T")[0];
      buildLocationGrid();
    })();

    if ('serviceWorker' in navigator){
      navigator.serviceWorker.register('sw.js');
    }

    function dataURLtoBlob(dataurl){
      const arr  = dataurl.split(',');
      const mime = arr[0].match(/:(.*?);/)[1];
      const bstr = atob(arr[1]);
      let n = bstr.length;
      const u8arr = new Uint8Array(n);
      while(n--){ u8arr[n] = bstr.charCodeAt(n); }
      return new Blob([u8arr], { type: mime });
    }
  </script>
</body>
