<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakpoint OPS</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f0f2f5;
}

/* SCREENS */
.screen{display:none;}
.screen.active{display:block;}

/* SPLASH (photo équipe) */
.splash{
  background:
    linear-gradient(rgba(45,74,62,.75), rgba(45,74,62,.75)),
    url("assets/team-photo.jpg") center/cover no-repeat;
  padding:40px 20px;
  color:white;
  text-align:center;
  font-size:18px;
  font-weight:bold;
}

/* HERO MODULE */
.hero{
  height:180px;
  background:
    linear-gradient(rgba(0,0,0,.4), rgba(0,0,0,.4)),
    url("assets/station-bag.jpg") center/cover no-repeat;
}

/* BUTTONS */
.btn{
  width:90%;
  margin:10px auto;
  display:block;
  padding:15px;
  border:none;
  border-radius:10px;
  font-size:16px;
  background:white;
  cursor:pointer;
}

.mod-btn{
  background:#2d4a3e;
  color:white;
}

/* INPUT */
input{
  width:90%;
  margin:10px;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:16px;
}
</style>
</head>

<body>

<!-- ========================= -->
<!-- PAGE 1 : STATIONS -->
<!-- ========================= -->
<div class="screen active" id="home">

  <div class="splash">
    👉 Sélectionnez votre station
  </div>

  <!-- 🔥 SANS LOGOS -->
  <button class="btn" onclick="goStation('Evere')">Evere</button>
  <button class="btn" onclick="goStation('Wemmel')">Wemmel</button>
  <button class="btn" onclick="goStation('Uccle')">Uccle</button>
  <button class="btn" onclick="goStation('Bruxelles')">Bruxelles</button>

</div>

<!-- ========================= -->
<!-- PAGE 2 : MODULES -->
<!-- ========================= -->
<div class="screen" id="modules">

  <div class="hero"></div>

  <button class="btn mod-btn" onclick="show('stock')">📦 Gestion stock</button>
  <button class="btn">🥐 Boulangerie (bientôt)</button>
  <button class="btn">🛠 Maintenance (bientôt)</button>

</div>

<!-- ========================= -->
<!-- PAGE 3 : STOCK -->
<!-- ========================= -->
<div class="screen" id="stock">

  <div class="splash">📦 Réception produit</div>

  <button class="btn mod-btn" onclick="openScanner()">📷 Scanner</button>

  <input id="ean" placeholder="Code EAN">
  <input id="name" placeholder="Nom produit">
  <input id="dlc" type="date">

  <button class="btn mod-btn" onclick="save()">✅ Enregistrer</button>

</div>

<!-- ========================= -->
<!-- SCANNER -->
<!-- ========================= -->
<div id="scanner" style="
display:none;
position:fixed;
inset:0;
background:black;
z-index:999;
flex-direction:column;
align-items:center;
justify-content:center;
">

  <video id="video" autoplay playsinline style="width:90%;border-radius:12px;"></video>

  <button class="btn" onclick="closeScanner()">Fermer</button>

</div>

<script>

/* SUPABASE */
const supabase = window.supabase.createClient(
  "https://hhsvazolktxqntyhuqqj.supabase.co",
  "sb_publishable_qr4Qq4OB-Qt1G8a0GO3WKw_IJxfRbl9"
);

let currentStation = "";
let stream = null;

/* NAV */
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function goStation(name){
  currentStation = name;
  show("modules");
}

/* SCANNER */
async function openScanner(){
  document.getElementById("scanner").style.display="flex";

  stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  });

  const video = document.getElementById("video");
  video.srcObject = stream;

  if("BarcodeDetector" in window){
    const detector = new BarcodeDetector({formats:["ean_13","code_128"]});

    setInterval(async ()=>{
      const codes = await detector.detect(video);
      if(codes.length){
        document.getElementById("ean").value = codes[0].rawValue;
        closeScanner();
        loadProduct(codes[0].rawValue);
      }
    },500);
  }
}

function closeScanner(){
  document.getElementById("scanner").style.display="none";
  if(stream) stream.getTracks().forEach(t=>t.stop());
}

/* LOAD PRODUIT */
async function loadProduct(ean){
  const {data} = await supabase
    .from("produits")
    .select("*")
    .eq("ean",ean)
    .single();

  if(data){
    document.getElementById("name").value = data.nom;
  }
}

/* SAVE */
async function save(){
  const ean = document.getElementById("ean").value;
  const name = document.getElementById("name").value;
  const dlc = document.getElementById("dlc").value;

  if(!ean || !name || !dlc){
    alert("Remplis tous les champs");
    return;
  }

  await supabase.from("produits").upsert({
    ean:ean,
    nom:name
  });

  await supabase.from("lots").insert({
    ean:ean,
    station:currentStation,
    dlc:dlc,
    quantite:1,
    statut:"actif"
  });

  alert("✅ Produit enregistré");
}

</script>

</body>
</html>
